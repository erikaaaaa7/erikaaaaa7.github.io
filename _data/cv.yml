    Publications:
      - title: UTILIZATION OF PHILIPPINE OREGANO (Plectranthus amboinicus) EXTRACT AS A POTENTIAL FOOD PRESERVATIVE ON  CHICKEN (Gallus gallus domesticus) INTESTINE
        authors:
          - BELOY, Paul Ayden M., MARAMBA, Jaze Aidan V., DE LEON, Julianne Erika S., JIMENEZ, Leonice Allison M.
        publisher: BELOY, Paul Ayden M., MARAMBA, Jaze Aidan V., DE LEON, Julianne Erika S., JIMENEZ, Leonice Allison M.
        releaseDate: 2025-04-01
        url: https://docs.google.com/document/d/1TKyXgtwgYdh9UkkYNZJoHVKvERUQOrsxl13Whd4NCj8/edit?usp=sharing 
        summary: Researchers tested a 75% Philippine Oregano extract as a natural preservative to inhibit bacterial growth in chicken intestines. While the extract significantly reduced both mesophilic aerobic and lactic acid bacteria compared to the untreated group, the overall inhibition was not strong enough to be considered fully effective. The study concludes that the plant has potential as an antibacterial agent, but suggests testing different concentrations or combining it with other natural alternatives to create a more powerful preservative.

      - title: Math Park
        authors:
          - DE LEON, Julianne Erika
        publisher: DE LEON, Julianne Erika
        releaseDate: 2025-11-24
        url: "#"
        summary: "This program simulates like a game wherein 1-4 players can join. The players will choose what difficulty they want to play in, and a pattern will be generated for them to answer. The difficulty of the pattern will depend on the level of difficulty they chose. There are 25 boxes in the game, the first player that will reach the 25th box wins. A player can also win if the other players are ejected from the game."

      - title: Virtual Mantis Game
        authors:
          - KATIGBAK, Rhian Mei
          - DE LEON, Julianne Erika 
        publisher: KATIGBAK, Rhian Mei, DE LEON, Julianne Erika
        releaseDate: 2026-03-30
        url: "#"
        summary: "Mantis, a colorfully cutthroat card game of RAINBOWS and REVENGE. This game is good for 3-6 players. Players only has two rules: Score or Steal. Each card has 1 color at the front, 3 colors at the back, and corresponding points. They have to collect caards with matching colors. The first player who reaches the winning point, wins."

